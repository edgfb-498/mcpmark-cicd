name: Pull Request Automation
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint checks
        id: eslint
        run: npm run lint

      - name: Run Prettier formatting checks
        id: prettier
        run: npx prettier --check .

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        id: code-quality-comment
        with:
          script: |
            const eslintOutput = `${{ steps.eslint.outputs.stdout || 'No ESLint output' }}`;
            const prettierOutput = `${{ steps.prettier.outputs.stdout || 'No Prettier output' }}`;
            const comment = `## Code Quality Report\n\n### ESLint Results:\n${eslintOutput}\n\n### Prettier Results:\n${prettierOutput}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite with coverage
        id: tests
        run: npm test -- --coverage

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage/

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        id: test-coverage-comment
        with:
          script: |
            const testOutput = `${{ steps.tests.outputs.stdout || 'No test output' }}`;
            const comment = `## Test Coverage Report\n\n${testOutput}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability checks
        id: npm-audit
        run: npm audit

      - name: Scan for secrets in code changes
        id: secret-scan
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        id: security-comment
        with:
          script: |
            const auditOutput = `${{ steps.npm-audit.outputs.stdout || 'No vulnerability output' }}`;
            const secretOutput = `${{ steps.secret-scan.outputs.stdout || 'No secrets found' }}`;
            const comment = `## Security Scan Report\n\n### Dependencies Vulnerabilities:\n${auditOutput}\n\n### Secrets Scan Results:\n${secretOutput}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: npm run build

      - name: Validate endpoints (example)
        id: endpoints
        run: |
          # Start application in background
          npm start &
          APP_PID=$!
          # Wait for server to start
          sleep 10
          # Validate main endpoint
          curl -I http://localhost:3000 || echo "Endpoint validation failed"
          # Clean up
          kill $APP_PID

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Post Build Validation Status
        uses: actions/github-script@v7
        id: build-comment
        with:
          script: |
            const buildOutput = `${{ steps.build.outputs.stdout || 'No build output' }}`;
            const endpointOutput = `${{ steps.endpoints.outputs.stdout || 'No endpoint validation output' }}`;
            const comment = `## Build Validation\n\n### Build Results:\n${buildOutput}\n\n### Endpoint Validation:\n${endpointOutput}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });